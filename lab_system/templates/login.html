<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión | ACAFOXX Labs</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="auth-body">
  <main class="auth-page">
    <section class="login-card">
      <div class="login-brand">
        <img
          class="login-logo"
          src="{{ url_for('static', filename='images/usergio_logo.png') }}"
          alt="Universidad Sergio Arboleda"
        />
        <div>
          <p class="login-kicker">ACAFOXX Labs</p>
          <h1 class="login-title">Iniciar sesión</h1>
        </div>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="flash-container">
            {% for category, message in messages %}
              <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('login') }}" class="login-form">
        <input type="hidden" name="next" value="{{ next_url }}" />

        <div class="form-group">
          <label for="username">Usuario</label>
          <input
            id="username"
            name="username"
            type="text"
            autocomplete="username"
            required
            autofocus
          />
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
          />
        </div>

        <button type="submit" class="btn-primary login-submit">Ingresar</button>
      </form>
    </section>
  </main>
</body>
</html>
