{% extends "base.html" %}
{% block title %}Nueva Reserva — ACAFOXX{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Nueva Reserva</h1>
  <a href="{{ url_for('reservations') }}" class="btn-link">← Volver a reservas</a>
</div>

<div class="form-card">
  <form method="POST" action="{{ url_for('add_reservation') }}">

    <div class="form-group">
      <label for="course_id">Curso</label>
      <select name="course_id" id="course_id" required>
        <option value="" disabled selected>Selecciona un curso…</option>
        {% for course in courses %}
        <option value="{{ course.course_id }}">
          [{{ course.code }}] {{ course.name }} — {{ course.professor }} ({{ course.students }} est.)
        </option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label for="lab">Laboratorio</label>
      <select name="lab" id="lab" required>
        <option value="" disabled selected>Selecciona un laboratorio…</option>
        {% for lab in labs %}
        <option value="{{ lab }}">{{ lab }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="date_str">Fecha</label>
        <input type="date" name="date_str" id="date_str" required />
      </div>
      <div class="form-group">
        <label for="time_str">Hora de inicio</label>
        <input type="time" name="time_str" id="time_str" required />
      </div>
    </div>

    <div class="form-note">
      ⚠ El sistema validará automáticamente que no existan colisiones de horario en el mismo laboratorio.
    </div>

    <div class="form-actions">
      <a href="{{ url_for('reservations') }}" class="btn-secondary">Cancelar</a>
      <button type="submit" class="btn-primary">Crear Reserva</button>
    </div>

  </form>
</div>
{% endblock %}
